---
# ==============================================================================
# Sample Application — Service
# ==============================================================================
# ClusterIP service exposing the sample app within the cluster.
# A NodePort is also configured for local Kind cluster access.
# ==============================================================================
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: chaos-sandbox
  labels:
    app: sample-app
    component: web
    managed-by: chaos-engineering-toolkit
spec:
  type: NodePort
  selector:
    app: sample-app
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
      protocol: TCP
