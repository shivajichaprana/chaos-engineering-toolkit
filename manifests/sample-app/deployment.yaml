---
# ==============================================================================
# Sample Application — Nginx Deployment
# ==============================================================================
# This deployment serves as the default chaos target for experiments.
# It runs 3 replicas of nginx with health probes and resource limits,
# simulating a typical production workload.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: chaos-sandbox
  labels:
    app: sample-app
    component: web
    managed-by: chaos-engineering-toolkit
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: sample-app
        component: web
        managed-by: chaos-engineering-toolkit
      annotations:
        chaos-toolkit/target: "true"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: sample-app-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-config
  namespace: chaos-sandbox
  labels:
    app: sample-app
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /health {
            access_log off;
            return 200 '{"status":"healthy","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        location /ready {
            access_log off;
            return 200 '{"status":"ready"}';
            add_header Content-Type application/json;
        }
    }
