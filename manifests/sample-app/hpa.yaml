---
# ==============================================================================
# Sample Application — Horizontal Pod Autoscaler
# ==============================================================================
# Scales the sample app between 3 and 10 replicas based on CPU utilization.
# Useful for testing how chaos experiments interact with autoscaling behavior.
# ==============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sample-app
  namespace: chaos-sandbox
  labels:
    app: sample-app
    managed-by: chaos-engineering-toolkit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sample-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
