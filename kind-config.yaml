# ==============================================================================
# Kind Cluster Configuration
# ==============================================================================
# 1 control plane + 3 worker nodes for realistic chaos experiments.
# Port mappings expose the sample app and Grafana on the host.
# ==============================================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: chaos-lab
networking:
  # Allow NodePort services to be accessed from the host
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
nodes:
  # Control plane node
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role.kubernetes.io/control-plane="
    extraPortMappings:
      # Sample app NodePort
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # Grafana NodePort (monitoring)
      - containerPort: 31000
        hostPort: 31000
        protocol: TCP
  # Worker nodes for running chaos experiments
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "chaos-role=target"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "chaos-role=target"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "chaos-role=target"
